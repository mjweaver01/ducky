<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Tail feathers (behind body) -->
  <path d="M 75 56 Q 85 50 88 58 Q 84 64 75 61 Z" fill="#f59e0b" opacity="0.9"/>
  <path d="M 76 62 Q 84 59 86 67 Q 81 73 75 68 Z" fill="#f59e0b" opacity="0.8"/>
  
  <!-- Beak / mouth pieces (behind body) -->
  <path class="upper-jaw" d="M 28 35 Q 18 35 18 38 L 28 38 Z" fill="#f59e0b" opacity="0.9"/>
  <path class="lower-jaw" d="M 28 38 L 18 38 Q 18 41 28 41 Z" fill="#f59e0b" opacity="0.9"/>
  
  <!-- Body -->
  <ellipse cx="50" cy="60" rx="28" ry="22" fill="#fbbf24"/>
  
  <!-- Head -->
  <circle cx="45" cy="35" r="18" fill="#fbbf24"/>
  
  <!-- Eye -->
  <circle cx="42" cy="32" r="3" fill="#0f172a"/>
  <circle cx="43" cy="31" r="1.2" fill="#ffffff"/>
  
  <!-- Wing -->
  <path d="M 55 55 Q 70 50 75 60 Q 70 68 60 65 Z" fill="#f59e0b" opacity="0.8"/>
  
  <!-- Feet -->
  <g transform="translate(38, 78)">
    <path d="M 0 0 L -2 4 M 0 0 L 0 5 M 0 0 L 2 4" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
  </g>
  <g transform="translate(52, 80)">
    <path d="M 0 0 L -2 4 M 0 0 L 0 5 M 0 0 L 2 4" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
