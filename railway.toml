# Railway configuration for ducky.wtf
# Each service must use its Dockerfile and repo root as build context (Root directory = empty).
#
# Only three services (delete @ducky/cli and @ducky/database if Railway created them):
# @ducky/server       | Dockerfile              | tunnel server (*.ducky.wtf)
# @ducky/web-backend  | Dockerfile.web-backend  | API (api.ducky.wtf)
# @ducky/web-frontend | Dockerfile.web-frontend | app (ducky.wtf)
#
# Required env vars per service (set in Railway dashboard):
#   server:       DATABASE_URL (auto-injected), BASE_DOMAIN, NODE_ENV, VALID_TOKENS (if not using DB auth)
#   web-backend: DATABASE_URL (auto-injected), JWT_SECRET, SESSION_SECRET, NODE_ENV, WEB_URL
#   web-frontend: VITE_API_URL (build arg — set as Railway variable)

[build]
builder = "DOCKERFILE"
